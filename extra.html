<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zestify - Sanket</title> <!-- It means Energetic -->

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <nav class="sidebar" id="sidebar">
            <!--<div class="sidebar-toggle-btn" id="sidebarToggle">
                <i class="fas fa-bars"></i></div>-->
            <div class="sidebar-content">
                <div class="nav-group">
                    <ul>
                        <li class="active"><i class="fas fa-home"></i>Home</li>
                        <li><i class="fas fa-compass"></i>Explore</li>
                    </ul>
                </div>

                <div class="nav-group">
                    <b><p class="nav-title">YOUR LIBRARY</p></b>
                    <ul id="playlistList">
                        <li><i class="fas fa-book"></i>Playlists</li>
                        <li><i class="fas fa-heart"></i>Liked Songs</li>
                        <li><i class="fas fa-microphone"></i>Artists</li>
                        <li><i class="fas fa-compact-disc"></i>Albums</li>
                    </ul>
                </div>

                <div class="nav-group">
                    <b><p class="nav-title">ACTIONS</p></b>
                    <ul>
                        <li id="createPlaylistSidebarBtn"><i class="fas fa-plus-square"></i>Create Playlist</li>
                        <li><i class="fas fa-bookmark"></i>Podcasts</li>
                    </ul>
                </div>
            </div>
        </nav>

        <main class="main-content">
            <header class="header">
                <h1 id="welcomeGreeting">Loading...</h1>

                <div class="search-content">
                    <i class="fas fa-search" id="searchIcon"></i>
                    <input type="text" id="searchbar" placeholder="Search Artists, Songs...">
                    <i class="fas fa-times" id="clearSearch" style="display:none;"></i>

                    <div class="search-dropdown" id="searchDropdown"></div>
                </div>

                <div class="header-log">
                        <div class="user-auth-section" id="user-profile">
                            <button class="auth-btn" id="loginBtn">Login</button>
                        </div>
                    </div>

                <div class="header-nav">
                    <div class="nav-arrows">
                        <button class="arrow-btn" title="Left-Navigate" id="backBtn"><i class="fas fa-chevron-left"></i></button>
                        <button class="arrow-btn" title="Right-Navigate" id="forwardBtn"><i class="fas fa-chevron-right"></i></button>
                    </div>
                </div>
            </header>
            
            <div class="main-scroll-area">
                <div id="home-content">
                    <div class="section">
                        <h2>Top Hits</h2>
                        <div class="song-container" id="topHits"></div>
                    </div>

                    <div class="section">
                        <h2>Trending Albums</h2>
                        <div class="song-container" id="trendingAlbums"></div>
                    </div>

                    <div class="section">
                        <h2>New Releases</h2>
                        <div class="song-container" id="newReleases"></div>
                    </div>

                    <div class="section">
                        <h2>Recommended for You</h2>
                        <div class="song-container" id="recommended"></div>
                    </div>
                </div>
                <!--<div id="playlist-content">
                    <div class="playlist-header-info">
                        <h2 id="currentPlaylistTitle">Your Playlists</h2>
                        <button id="createNewPlaylistBtn" class="auth-btn"><i class="fas fa-plus"></i>Create New</button>
                        </div>
                        <div id="playlistSectionContainer" class="song-container">
                        </div>
                    </div>-->
                    <!--<div id="explore-content">
                        <div slass="section">
                            <h2 class="section-title">Explore by Category</h2>
                            <div class="category-grid">
                                <div class="cat-card" onclick="filterByCategory('trending')">🔥 Trending</div>
                                <div class="cat-card" onclick="filterByCategory('topHits')">🎸 Top Hits</div>
                                <div class="cat-card" onclick="filterByCategory('newReleases')">✨ New</div>
                                <div class="cat-card" onclick="filterByCategory('recommended')">🎧 For You</div>    
                            </div>
                            <div id="exploreResults" class="song-container"></div>
                        </div>
                    </div>-->
                </div>
            </div>
        </div>
        </main>
    </div>

    <footer class="footer-player">
        <div class="curr-song-info">
            <img src="assets/covers/placeholder.jpg" id="footerCover" alt="song cover" >
            <div class="song-details">
                <p id="playSongName">Select a Song</p>
                <p id="playArtistName">Artist Name</p>
            </div>
        </div>
        
        <div class="player-controls">
            <div class="controls">
                <button id="shuffle"><i class="fas fa-random" title="Shuffle"></i></button>
                <button id="prev"><i class="fas fa-backward-step" title="Previous"></i></button>
                <button id="play" class="fas fa-play-circle" title="Play"></button>
                <button id="next"><i class="fas fa-forward-step" title="Next"></i></button>
                <button id="repeat"><i class="fas fa-redo" title="Repeat"></i></button>
            </div>
            
            <div class="playback-bar">
                <span id="currentTime">0:00</span>
                <div class="progress-bar-container">
                    <input type="range" id="progressBar" value="0" title="Progress">
                </div>
                <span id="totalTime">0:00</span>
            </div>
        </div>
        
        <div class="extra-controls">
            <i class="fas fa-volume-up" id="volIcon"></i>
            <input type="range" id="volumeBar" min="0" max="100" value="100" title="Volume"/>

            <div class="music-waves" id="wave">
                <div class="wave1"></div>
                <div class="wave1"></div>
                <div class="wave1"></div>
                <div class="wave1"></div>
            </div>
        </div>
    </footer>

    <div id="authModal" class="modal">
    <div class="modal-content">
        <span class="close-btn">&times;</span>
        <div class="form-container">
            <h2 id="modalTitle">Login to Zestify</h2>
            <form id="authForm">
                <input type="text" id="username" placeholder="Full Name">
                <input type="email" id="email" placeholder="Email Address" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" id="submitBtn">Login</button>
            </form>
            <p id="toggleText">Don't have an account? <span id="switchForm">Sign Up</span></p>
        </div>
    </div>
</div>
        <script src="app.js"></script>
</body>
</html>
